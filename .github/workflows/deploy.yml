name: Deploy

on:
  push:
    branches: [main]

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  deploy-supabase:
    name: Deploy Supabase Migrations
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Link Supabase project
        run: supabase link --project-ref ${{ secrets.SUPABASE_PROJECT_REF }}
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

      - name: Apply pending migrations
        run: supabase db push
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}

      - name: Deploy Edge Functions
        run: |
          supabase functions deploy on-task-approved
          supabase functions deploy generate-pdf
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

      - name: Generate TypeScript types
        run: |
          supabase gen types typescript --project-id ${{ secrets.SUPABASE_PROJECT_REF }} \
            > packages/db-types/src/database.types.ts
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

      - name: Commit updated types
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: 'chore: regenerate database types [skip ci]'
          file_pattern: 'packages/db-types/src/database.types.ts'

  deploy-web:
    name: Deploy Web (Vercel)
    runs-on: ubuntu-latest
    needs: deploy-supabase   # migrations must succeed before web deploys
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - run: pnpm install --frozen-lockfile

      - name: Build web
        run: pnpm --filter @ftth/web build
        env:
          NEXT_PUBLIC_SUPABASE_URL:   ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          NEXT_PUBLIC_APP_URL:        ${{ secrets.NEXT_PUBLIC_APP_URL }}
          NEXT_PUBLIC_APP_VERSION:    ${{ github.sha }}
          NEXT_PUBLIC_SENTRY_DSN:     ${{ secrets.NEXT_PUBLIC_SENTRY_DSN }}
          NEXT_PUBLIC_SENTRY_ENV:     production
          SENTRY_DSN:                 ${{ secrets.SENTRY_DSN }}
          SENTRY_ORG:                 ${{ secrets.SENTRY_ORG }}
          SENTRY_PROJECT:             ${{ secrets.SENTRY_PROJECT }}
          SENTRY_AUTH_TOKEN:          ${{ secrets.SENTRY_AUTH_TOKEN }}

      - name: Deploy to Vercel
        uses: amondnet/vercel-action@v25
        with:
          vercel-token:      ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id:     ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
          vercel-args: '--prod'
          working-directory: apps/web

      - name: Create Sentry release
        uses: getsentry/action-release@v1
        env:
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
          SENTRY_ORG:        ${{ secrets.SENTRY_ORG }}
          SENTRY_PROJECT:    ${{ secrets.SENTRY_PROJECT }}
        with:
          environment: production
          version: ${{ github.sha }}

  load-test:
    name: Load Test (k6)
    runs-on: ubuntu-latest
    needs: deploy-web
    # Only run load tests on scheduled deploys, not every push
    if: github.event_name == 'push' && contains(github.event.head_commit.message, '[load-test]')
    steps:
      - uses: actions/checkout@v4

      - name: Install k6
        run: |
          curl https://github.com/grafana/k6/releases/download/v0.54.0/k6-v0.54.0-linux-amd64.tar.gz \
            -L -o k6.tar.gz
          tar xzf k6.tar.gz
          sudo mv k6-v0.54.0-linux-amd64/k6 /usr/local/bin/k6

      - name: Run dashboard load test
        run: k6 run --env BASE_URL=${{ secrets.NEXT_PUBLIC_APP_URL }} --env TEST_TOKEN=${{ secrets.K6_TEST_TOKEN }} tests/load/dashboard.js

      - name: Run sync load test
        run: k6 run --env BASE_URL=${{ secrets.NEXT_PUBLIC_APP_URL }} --env TEST_TOKEN=${{ secrets.K6_TEST_TOKEN }} tests/load/sync.js

      - name: Run invoice load test
        run: k6 run --env BASE_URL=${{ secrets.NEXT_PUBLIC_APP_URL }} --env TEST_TOKEN=${{ secrets.K6_TEST_TOKEN }} tests/load/invoice.js
